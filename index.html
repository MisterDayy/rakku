<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rakku &mdash; Baca Manga &amp; Nonton Anime</title>
<link rel="icon" type="image/jpeg" href="assets/logo.jpg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="splashScreen" class="splash-screen">
  <video id="splashVideo" src="assets/splash.mp4" autoplay muted playsinline webkit-playsinline></video>
</div>
<script>
(function () {
  var KEY = "rakku_splash_shown";
  var splash = document.getElementById("splashScreen");
  var video = document.getElementById("splashVideo");

  if (sessionStorage.getItem(KEY)) {
    splash.style.display = "none";
    return;
  }

  var hidden = false;
  function hideSplash() {
    if (hidden) return;
    hidden = true;
    sessionStorage.setItem(KEY, "1");
    splash.classList.add("fade-out");
    setTimeout(function () {
      splash.style.display = "none";
    }, 400);
  }

  video.addEventListener("ended", hideSplash);
  video.addEventListener("error", hideSplash);
  // Jaga-jaga kalau video gagal autoplay/lambat load di HP tertentu
  setTimeout(hideSplash, 6000);
})();
</script>

<header class="topbar">
  <div class="brand">
    <img class="brand-mark" src="assets/logo.jpg" alt="Rakku" />
    <span class="brand-text">Rakku</span>
  </div>
  <div class="search-box" id="searchBox">
    <button class="search-icon-btn" id="searchIconBtn" aria-label="Cari" type="button">
      <svg viewBox="0 0 24 24" width="17" height="17"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14"/></svg>
    </button>
    <input type="text" id="searchInput" placeholder="Cari judul manga..." />
  </div>
  <button class="hamburger-btn" id="hamburgerBtn" aria-label="Menu">
    <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/></svg>
  </button>
</header>

<div class="side-menu-overlay" id="sideMenuOverlay"></div>
<nav class="side-menu" id="sideMenu">
  <div class="side-menu-header">
    <img class="brand-mark" src="assets/logo.jpg" alt="Rakku" /> Rakku
  </div>
  <button class="side-menu-item active" data-mode="manga">
    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M4 4h9a3 3 0 0 1 3 3v13a2 2 0 0 0-2-2H4zm11 3a3 3 0 0 1 3-3h2v14h-3a2 2 0 0 0-2 2z"/></svg>
    Baca Manga
  </button>
  <button class="side-menu-item side-menu-parent" data-mode="anime" id="animeMenuToggle">
    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M4 5h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1h-6l2 3H8l2-3H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1m4.5 3.5v6l5-3z"/></svg>
    <span class="side-menu-label">Nonton Anime</span>
    <svg class="side-menu-chevron" id="animeChevron" viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
  </button>
  <div class="side-menu-sub" id="animeSubMenu">
    <button class="side-menu-sub-item" data-anime-page="home">Home</button>
    <button class="side-menu-sub-item" data-anime-page="genre">Jelajah</button>
    <button class="side-menu-sub-item" data-anime-page="jadwal">Jadwal</button>
  </div>
</nav>

<main class="container" id="app"></main>

<nav class="bottom-nav" id="bottomNav"></nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script src="manga.js"></script>
<script src="anime.js"></script>
<script src="main.js"></script>
</body>
</html>
